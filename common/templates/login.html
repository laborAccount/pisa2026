<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
	<title>Login V2</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
<!--===============================================================================================-->
	<link rel="stylesheet" type="text/css" href="{% static 'common/vendor/bootstrap/css/bootstrap.min.css' %}">
<!--===============================================================================================-->
	<link rel="stylesheet" type="text/css" href="{% static 'common/fonts/font-awesome-4.7.0/css/font-awesome.min.css' %}">
<!--===============================================================================================-->
	<link rel="stylesheet" type="text/css" href="{% static 'common/css/util.css' %}">
	<link rel="stylesheet" type="text/css" href="{% static 'common/css/main.css' %}">
<!--===============================================================================================-->
</head>
<body>
	
	<div class="limiter">
		<div class="container-login100">
			<div class="wrap-login100">
				<form class="login100-form validate-form" action="{% url 'do_login' %}" method="post">
                    {% csrf_token %}
                    <span class="login100-form-title p-b-26">
						PISA 2022<br />표집학교 책임자 및 감독 교사<br />온라인 연수
					</span>

					<div class="wrap-input100 validate-input" data-validate = "아이디를 입력하세요.">
						<input class="input100" type="text" name="accountId">
						<span class="focus-input100" data-placeholder="아이디"></span>
					</div>

					<div class="wrap-input100 validate-input" data-validate="비밀번호를 입력하세요.">
						<span class="btn-show-pass">
							<i class="zmdi zmdi-eye"></i>
						</span>
						<input class="input100" type="password" name="password">
						<span class="focus-input100" data-placeholder="비밀번호"></span>
					</div>

                    {% if error %}
                    <div class="text-center p-t-11" style="color:#e6185e; font-size:13px; margin-top:10px;">
                        <i class="fa fa-exclamation-circle"></i> {{ error }}
                    </div>
                    {% endif %}

					<div class="container-login100-form-btn">
						<div class="wrap-login100-form-btn">
							<div class="login100-form-bgbtn"></div>
							<button class="login100-form-btn">
								로그인
							</button>
						</div>
					</div>

					<div class="text-center p-t-115">
						<span class="txt1">
							한국교육과정평가원<br />Copyright ⓒ 2021 KICE. All Rights Reserved.
						</span>
					</div>
				</form>
			</div>
		</div>
	</div>
	
	<div id="dropDownSelect1"></div>
	
<!--===============================================================================================-->
	<script src="{% static 'common/vendor/jquery/jquery-3.2.1.min.js' %}"></script>
	<script src="{% static 'common/vendor/bootstrap/js/bootstrap.min.js' %}"></script>
<!--===============================================================================================-->

	<script src="{% static 'common/js/main.js' %}"></script>

</body>
</html>
